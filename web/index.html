<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DISTRIBUTED ORM | SYS.METRICS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="layout-wrapper">
        <aside class="control-panel">
            <header>
                <h1>SYS.METRICS</h1>
                <p>// N+1 QUERY SIMULATION // OVERHEAD ANALYSIS</p>
            </header>

            <div class="control-group">
                <label>> COUNTRY_FILTER</label>
                <select id="country-select">
                    <option value="United Kingdom" selected>UK</option>
                    <option value="United States">US</option>
                    <option value="">ALL</option>
                </select>
            </div>

            <div class="control-group">
                <label>> RECORD_LIMIT</label>
                <input type="number" id="limit-input" value="50" min="1" max="300">
            </div>

            <div class="control-group">
                <label>> SIMULATE_NETWORK_LAG (MS)</label>
                <select id="latency-select">
                    <option value="0">000_MS</option>
                    <option value="10">010_MS</option>
                    <option value="50" selected>050_MS</option>
                    <option value="100">100_MS</option>
                    <option value="200">200_MS</option>
                </select>
            </div>

            <div class="mode-switch-wrapper">
                <div class="switch-label">> PROTOCOL_SELECT</div>
                <label class="mech-switch" for="mode-toggle">
                    <input type="checkbox" id="mode-toggle">
                    <div class="mech-track">
                        <div class="mech-thumb"></div>
                    </div>
                </label>
                <div id="mode-text" class="status-lazy">[ LAZY_LOADING | N+1 ]</div>
            </div>

            <button id="run-query" class="mech-btn">EXECUTE SEQUENCE</button>

            <div class="stats-box" id="query-stats">
                <div class="stat-row">
                    <span>STATUS</span>
                    <span class="stat-val">AWAITING INPUT</span>
                </div>
            </div>
        </aside>

        <main class="data-stream" id="query-results">
            <div class="giant-bg">NO_DATA_STREAM</div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
